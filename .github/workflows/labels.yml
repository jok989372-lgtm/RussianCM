name: Labels

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: labels-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  labels:
    name: Sync and apply labels
    runs-on: ubuntu-latest
    steps:
      - name: Sync labels and apply event labels
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const labels = {
              'S: Awaiting Changes': { color: 'd93f0b', description: 'Changes requested by review.' },
              'S: Approved': { color: '0e8a16', description: 'Approved by a trusted reviewer.' },
              'S: Merge Conflict': { color: 'b60205', description: 'Pull request has merge conflicts.' },
              'Branch: Stable': { color: '5319e7', description: 'Targets the stable branch.' },
              'Branch: Staging': { color: '1d76db', description: 'Targets the staging branch.' },
              'Changes: Sprites': { color: 'c5def5', description: 'Changes sprite image assets.' },
              'Changes: Map': { color: 'bfdadc', description: 'Changes map files.' },
              'Changes: UI': { color: 'd4c5f9', description: 'Changes UI/XAML files.' },
              'Changes: Shaders': { color: '0052cc', description: 'Changes shader files.' },
              'Changes: Audio': { color: 'fbca04', description: 'Changes audio assets.' },
              'Changes: No C#': { color: 'fef2c0', description: 'Contains no C# file changes.' },
              'Changes: Translations': { color: '0e8a16', description: 'Changes localization files.' },
              'XS': { color: 'c2e0c6', description: 'Very small pull request.' },
              'S': { color: 'bfd4f2', description: 'Small pull request.' },
              'M': { color: 'd4c5f9', description: 'Medium pull request.' },
              'L': { color: 'fef2c0', description: 'Large pull request.' },
              'XL': { color: 'f9d0c4', description: 'Very large pull request.' },
              'W: In Progress': { color: '1d76db', description: 'Work in progress.' },
              'W: Discussion': { color: '5319e7', description: 'Needs design or discussion.' },
              'W: Backlog': { color: 'cfd3d7', description: 'Backlog item.' },
              'W: Next': { color: '0e8a16', description: 'Prioritized next work.' },
              'Toolshed': { color: '006b75', description: 'Toolshed-related issue or PR.' },
            };

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deletedLabels = [
              'S: Untriaged',
              'S: Needs Review',
              'S: Required Checks Passed',
              'S: Required Checks Failed',
              'S: Integration Tests Passed',
              'S: Integration Tests Failed',
            ];
            const syncLabels =
              context.eventName === 'issues' ||
              (context.eventName === 'pull_request_target' && ['opened', 'reopened'].includes(context.payload.action));

            if (syncLabels) {
              const existing = new Map((await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner,
                repo,
                per_page: 100,
              })).map(label => [label.name, label]));

              for (const [name, config] of Object.entries(labels)) {
                const current = existing.get(name);
                if (!current) {
                  await github.rest.issues.createLabel({ owner, repo, name, ...config });
                  continue;
                }

                if (current.color.toLowerCase() !== config.color || (current.description || '') !== config.description) {
                  await github.rest.issues.updateLabel({ owner, repo, name, new_name: name, ...config });
                }
              }

              for (const name of deletedLabels) {
                if (existing.has(name)) {
                  await github.rest.issues.deleteLabel({ owner, repo, name });
                }
              }
            }

            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const review = context.payload.review;
            const issue_number = issue?.number || pr?.number;

            async function add(issue_number, names) {
              const labels = names.filter(Boolean);
              if (labels.length > 0) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
              }
            }

            async function remove(issue_number, names) {
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const currentNames = new Set(current.map(label => label.name));
              for (const name of names) {
                if (currentNames.has(name)) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                }
              }
            }

            async function applySize(pr) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const changed = files.reduce((sum, file) => sum + file.additions + file.deletions, 0);
              const size = changed >= 5000 ? 'XL' : changed >= 1000 ? 'L' : changed >= 100 ? 'M' : changed >= 10 ? 'S' : 'XS';
              const sizeLabels = ['XS', 'S', 'M', 'L', 'XL'];
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const currentNames = new Set(current.map(label => label.name));
              const staleSizes = sizeLabels.filter(label => label !== size && currentNames.has(label));

              if (staleSizes.length > 0) {
                await remove(pr.number, staleSizes);
              }

              if (!currentNames.has(size)) {
                await add(pr.number, [size]);
              }
            }

            async function applyMergeConflict(pr) {
              let latest;
              for (let attempt = 0; attempt < 8; attempt++) {
                const { data } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
                latest = data;
                if (latest.mergeable_state && latest.mergeable_state !== 'unknown') {
                  break;
                }
                await new Promise(resolve => setTimeout(resolve, 5000));
              }

              if (!latest?.mergeable_state || latest.mergeable_state === 'unknown') {
                core.warning('Could not determine mergeable_state after retries.');
                return;
              }

              const current = new Set((latest.labels || []).map(label => label.name));
              if (latest.mergeable_state === 'dirty') {
                if (!current.has('S: Merge Conflict')) {
                  await add(pr.number, ['S: Merge Conflict']);
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: 'This pull request has conflicts. Please resolve them before review can continue.',
                  });
                }
              } else {
                await remove(pr.number, ['S: Merge Conflict']);
              }
            }

            if (pr) {
              if (pr.base.ref === 'stable') {
                await add(pr.number, ['Branch: Stable']);
                await remove(pr.number, ['Branch: Staging']);
              } else if (pr.base.ref === 'staging') {
                await add(pr.number, ['Branch: Staging']);
                await remove(pr.number, ['Branch: Stable']);
              } else {
                await remove(pr.number, ['Branch: Stable', 'Branch: Staging']);
              }

              if (context.payload.action === 'synchronize') {
                await remove(pr.number, [
                  'S: Approved',
                  'S: Awaiting Changes',
                ]);
              }

              await applySize(pr);
              await applyMergeConflict(pr);
            }

            if (review) {
              const pullNumber = Number(review.pull_request_url.split('/').pop());
              const trusted = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(review.author_association);
              if (review.state === 'approved' && trusted) {
                await add(pullNumber, ['S: Approved']);
                await remove(pullNumber, ['S: Awaiting Changes']);
              } else if (review.state === 'changes_requested' && trusted) {
                await add(pullNumber, ['S: Awaiting Changes']);
                await remove(pullNumber, ['S: Approved']);
              }
            }

  path-labeler:
    name: Apply path labels
    if: github.event_name == 'pull_request_target'
    needs: labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - uses: actions/labeler@v6.1.0
        with:
          repo-token: ${{ github.token }}
          configuration-path: .github/labeler.yml
          sync-labels: true
