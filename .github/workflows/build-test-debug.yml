name: Testcases

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

permissions:
  contents: read
  actions: write # required by artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # cancel old, start anew in same PR

jobs:
  build:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      # - name: Pull engine updates # mark a submodule PR dependency in description
      #   uses: space-wizards/submodule-dependency@v0.1.5 # not updated in ~5 years (uses node12!)
      # - name: Update engine submodules
      #   run: cd RobustToolbox && git submodule update --init --recursive

      - uses: actions/setup-dotnet@v5 # cache lock files
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.props
            **/*.targets
            **/packages.lock.json
      - run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration DebugOpt --no-restore --property:WarningLevel=0 /m # WarningLevel=0 turns off emission of all warning messages
      - name: Run Content.Tests # catch early fails, takes ~2mins
        run: dotnet test --no-build --verbosity normal --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0

      - name: Upload build artifacts # upload bin/ directory for shards
        uses: actions/upload-artifact@v7
        with:
          name: build-debugopt
          path: |
            bin/
            RobustToolbox/
            Resources/
          if-no-files-found: error # detect empty artifact
          retention-days: 1

  # Split into 10 shards (11 jobs) for now, GH supports ~20 concurrent jobs
  # New test folders need to be declared (IMPORTANT) or it will silently not run
  # Catch-all guard will be made in future
  integration-tests:
    name: ${{ matrix.shard.name }}
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # run all shards, even when one fails
      matrix:
        shard:
          - name: root # generated by bash script below (Content.IntegrationTests.Tests/*)

          # Legacy SS14 Tests - each shard groups related namespaces
          # The contains (~) operator includes subfolders.
          - name: admin_access_ui
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Administration
              | FullyQualifiedName~Content.IntegrationTests.Tests.Access
              | FullyQualifiedName~Content.IntegrationTests.Tests.Commands
              | FullyQualifiedName~Content.IntegrationTests.Tests.EncryptionKeys
              | FullyQualifiedName~Content.IntegrationTests.Tests.Lobby
              | FullyQualifiedName~Content.IntegrationTests.Tests.Roles
              | FullyQualifiedName~Content.IntegrationTests.Tests.Toolshed
              | FullyQualifiedName~Content.IntegrationTests.Tests.UserInterface

          - name: atmos_fluids_physics
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Atmos
              | FullyQualifiedName~Content.IntegrationTests.Tests.Explosion
              | FullyQualifiedName~Content.IntegrationTests.Tests.Fluids
              | FullyQualifiedName~Content.IntegrationTests.Tests.Gravity
              | FullyQualifiedName~Content.IntegrationTests.Tests.Physics

          - name: mapping_station_shuttle_round
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.GameRules
              | FullyQualifiedName~Content.IntegrationTests.Tests.Mapping
              | FullyQualifiedName~Content.IntegrationTests.Tests.Procedural
              | FullyQualifiedName~Content.IntegrationTests.Tests.Replays
              | FullyQualifiedName~Content.IntegrationTests.Tests.Round
              | FullyQualifiedName~Content.IntegrationTests.Tests.Shuttle
              | FullyQualifiedName~Content.IntegrationTests.Tests.Station
              | FullyQualifiedName~Content.IntegrationTests.Tests.Tiles

          - name: cleanup_entities_world
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Cleanup
              | FullyQualifiedName~Content.IntegrationTests.Tests.Damageable
              | FullyQualifiedName~Content.IntegrationTests.Tests.Destructible
              | FullyQualifiedName~Content.IntegrationTests.Tests.DeviceLinking
              | FullyQualifiedName~Content.IntegrationTests.Tests.DeviceNetwork
              | FullyQualifiedName~Content.IntegrationTests.Tests.Disposal
              | FullyQualifiedName~Content.IntegrationTests.Tests.Doors
              | FullyQualifiedName~Content.IntegrationTests.Tests.Embedding
              | FullyQualifiedName~Content.IntegrationTests.Tests.GameObjects.
              | FullyQualifiedName~Content.IntegrationTests.Tests.Payload
              | FullyQualifiedName~Content.IntegrationTests.Tests.Power
              | FullyQualifiedName~Content.IntegrationTests.Tests.Weldable
              | FullyQualifiedName~Content.IntegrationTests.Tests.Wires

          - name: gameplay_core
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Actions
              | FullyQualifiedName~Content.IntegrationTests.Tests.Body
              | FullyQualifiedName~Content.IntegrationTests.Tests.Buckle
              | FullyQualifiedName~Content.IntegrationTests.Tests.Chameleon
              | FullyQualifiedName~Content.IntegrationTests.Tests.Climbing
              | FullyQualifiedName~Content.IntegrationTests.Tests.Cloning
              | FullyQualifiedName~Content.IntegrationTests.Tests.DoAfter
              | FullyQualifiedName~Content.IntegrationTests.Tests.Interaction
              | FullyQualifiedName~Content.IntegrationTests.Tests.Internals
              | FullyQualifiedName~Content.IntegrationTests.Tests.Minds
              | FullyQualifiedName~Content.IntegrationTests.Tests.Movement
              | FullyQualifiedName~Content.IntegrationTests.Tests.Networking
              | FullyQualifiedName~Content.IntegrationTests.Tests.NPC
              | FullyQualifiedName~Content.IntegrationTests.Tests.Puller

          - name: items_storage_crafting
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Chemistry
              | FullyQualifiedName~Content.IntegrationTests.Tests.Construction
              | FullyQualifiedName~Content.IntegrationTests.Tests.Hands
              | FullyQualifiedName~Content.IntegrationTests.Tests.Lathe
              | FullyQualifiedName~Content.IntegrationTests.Tests.Materials
              | FullyQualifiedName~Content.IntegrationTests.Tests.Sprite
              | FullyQualifiedName~Content.IntegrationTests.Tests.Storage
              | FullyQualifiedName~Content.IntegrationTests.Tests.Strip
              | FullyQualifiedName~Content.IntegrationTests.Tests.Tag
              | FullyQualifiedName~Content.IntegrationTests.Tests.Utility
              | FullyQualifiedName~Content.IntegrationTests.Tests.Vending

          - name: proto_lint_locale_serial
            filter: >-
              FullyQualifiedName~Content.IntegrationTests.Tests.Guidebook
              | FullyQualifiedName~Content.IntegrationTests.Tests.Linter
              | FullyQualifiedName~Content.IntegrationTests.Tests.Localization
              | FullyQualifiedName~Content.IntegrationTests.Tests.Preferences
              | FullyQualifiedName~Content.IntegrationTests.Tests.PrototypeTests
              | FullyQualifiedName~Content.IntegrationTests.Tests.Serialization

          # Exclusion filter not made yet for this:
          # - name: root_heavy_entity
          #   filter: >-
          #     FullyQualifiedName~Content.IntegrationTests.Tests.SpawnAndDirtyAllEntities
          #     | FullyQualifiedName~Content.IntegrationTests.Tests.SpawnAndDeleteAllEntitiesOnDifferentMaps
          #     | FullyQualifiedName~Content.IntegrationTests.Tests.SpawnAndDeleteEntityCountTest

          # CMU Tests
          - name: rmc # ~43kb monster file
            filter: FullyQualifiedName~Content.IntegrationTests._RMC14
          - name: cmu
            filter: FullyQualifiedName~Content.IntegrationTests._CMU14

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-debugopt
          path: .

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Prepare runtime content # match what ProgramShared.DoMounts() expects..
        run: |
          mkdir -p bin/Resources; mkdir -p bin/RobustToolbox/Resources
          cp -r Resources/* bin/Resources/
          cp -r RobustToolbox/Resources/* bin/RobustToolbox/Resources/

      # ProgramShared.DoMounts() is really messing with sharding..
      - name: Runtime diagnostics
        if: matrix.shard.name == 'root'
        shell: bash
        run: |
          set -euo pipefail
          echo "--- pwd & github.workspace---"
          pwd; echo "$GITHUB_WORKSPACE"
          echo
          echo "--- expected Robust relative paths ---"
          realpath .
          realpath ./Resources || true
          realpath ./bin/Content.IntegrationTests || true
          realpath ./bin/Content.IntegrationTests/Resources || true
          echo
          echo "--- locate Resources dirs ---"
          find . -type d -name "Resources"
          echo
          echo "--- locate example RSI ---"
          find . -name "areas_sheperd.rsi"
          find . -name "areas_strata.rsi"
          echo
          echo "--- locate integration dll ---"
          find . -name "Content.IntegrationTests.dll"
          echo
          echo "--- top-level repo ---"
          ls -lAhGSr
          echo
          echo "--- bin/Content.IntegrationTests/ top-level ---"
          ls -lAhGSr bin/Content.IntegrationTests/
          echo
          echo "--- listing testcases ---"
          dotnet test bin/Content.IntegrationTests/Content.IntegrationTests.dll --list-tests

      - name: Run ${{ matrix.shard.name }}
        shell: bash
        run: |
          export DOTNET_gcServer=1
          shard="${{ matrix.shard.name }}"

          if [ "$shard" = "root" ]; then
            shopt -s nullglob
            files=(Content.IntegrationTests/Tests/*.cs)
            if [ ${#files[@]} -eq 0 ]; then
              echo "::error::$shard shard: no test files found in Content.IntegrationTests/Tests!"
              exit 1
            fi
            FILTER=""
            for f in "${files[@]}"; do
              base=$(basename "$f" .cs)
              FILTER="${FILTER:+$FILTER | }FullyQualifiedName~Content.IntegrationTests.Tests.$base"
            done
          else
            FILTER='${{ matrix.shard.filter }}'
          fi
          echo "--- $shard shard is using the following filter: ---"
          echo "$FILTER"

          cd bin/Content.IntegrationTests || exit 1
          echo "--- $shard shard: starting testcases ---"
          dotnet test Content.IntegrationTests.dll \
            --verbosity normal --filter "$FILTER" -- NUnit.ConsoleOut=0 NUnit.MapWarningTo=Failed
          rc=$?
          echo "--- $shard shard: dotnet test exited with status=$rc ---"
          exit $rc

  ci-success:
    name: Build & Test Debug
    needs: [ build, integration-tests ]
    runs-on: ubuntu-latest
    steps:
      - run: exit 0
