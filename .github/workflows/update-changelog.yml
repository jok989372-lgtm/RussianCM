name: Changelog

concurrency:
  group: update-changelog
  cancel-in-progress: false

on:
  # workflow_run:
  #   workflows: ["Publish"]
  #   types: [completed]    # Publish
  schedule:
    - cron: "0 10 * * *"    # Daily
  workflow_dispatch:        # Manual
    inputs:
      start_date:
        description: "Backfill from date (ISO 8601), automatic when empty"
        required: false
      category:
        description: "Changelog category, keep default"
        required: false
        default: "CMU"

jobs:
  update:
    runs-on: ubuntu-latest
    if: >
      vars.DONT_UPDATE_CHANGELOG != 'true'
      && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Parse PRs into Parts
        run: Tools/update_changelog_parts.py Resources/Changelog/Parts --category ${{inputs.category || 'CMU' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          START_DATE: ${{ inputs.start_date }}

      - name: Update changelog
        run: Tools/update_changelog.py Resources/Changelog/CMU.yml
          Resources/Changelog/Parts --category ${{ inputs.category || 'CMU' }}

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update changelog [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
