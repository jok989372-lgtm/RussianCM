name: RGA schema validator
on:
  push:
    branches: [master, staging, stable]
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  yaml-schema-validation:
    name: YAML RGA schema validator
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          submodules: false

      - name: Setup Submodule
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      - uses: PaulRitter/yaml-schema-validator@v1
        with:
          schema: .github/Schemas/rga.yml
          path_pattern: .*attributions.ya?ml$
          validators_path: .github/Schemas/rga_validators.py
          validators_requirements: .github/Schemas/rga_requirements.txt
