name: Test Packaging
on:
  push:
    branches: [master, staging, stable]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      - 'RobustToolbox'
      - 'RobustToolbox/**'
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [master, staging, stable]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      - 'RobustToolbox'
      - 'RobustToolbox/**'

permissions:
  contents: read

concurrency:
  group: test-packaging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release

jobs:
  package:
    name: Test Packaging / ${{ matrix.name }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            command: client
            restore: dotnet restore
          - name: server-win-x64
            command: server --platform win-x64
            restore: dotnet restore --runtime win-x64 /p:TargetOs=Windows

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.props
            **/*.targets
            **/packages.lock.json

      - name: Restore dependencies
        run: ${{ matrix.restore }}

      - name: Build Packaging
        run: dotnet build Content.Packaging --configuration ${{ env.CONFIGURATION }} --no-restore /m

      - name: Package ${{ matrix.name }}
        run: dotnet run --project Content.Packaging --configuration ${{ env.CONFIGURATION }} --no-build --no-restore -- ${{ matrix.command }} --no-restore
