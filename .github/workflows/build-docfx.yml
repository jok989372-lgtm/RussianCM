name: Build & Publish Docfx

on:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  pages: write

jobs:
  docfx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          submodules: false

      - name: Setup submodule
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth=1

      # - name: update engine submodules
      #   run: |
      #     cd robusttoolbox/
      #     git submodule update --init --recursive

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build --no-restore

      - name: Build DocFX
        uses: nikeee/docfx-action@v1.0.0
        with:
          args: Content.Docfx/docfx.json

      - name: Publish Docfx Documentation on GitHub Pages
        uses: maxheld83/ghpages@master
        env:
          BUILD_DIR: Content.Docfx/_content-site
          GH_PAT: ${{ secrets.GH_PAT }}
