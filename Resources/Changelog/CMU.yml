- author: MarshesAndMeadows
  changes:
  - message: Added the Trapper boiler strain, a further specialized boiler focusing
      on ambushes and rapidly chewing through marine static defenses.
    type: Add
  - message: Added the Deploy Traps ability, a rapid deployment of snaring traps to
      snare prey, able to even be deployed right under their feet, though easily destroyed
      by shooting or with a melee attack. Includes SFX for getting snared. Deploy
      Traps can also be empowered by Insight, and will in turn empower Acid Mine when
      cast this way.
    type: Add
  - message: Added the Acid Mine attack, a remote detonation of acid that has a short
      delay before dealing damage. Deals increased damage to structures, includes
      VFX and SFX. Also reduces the cooldown of Deploy Traps when you hit mobs.
    type: Add
  - message: Added the Acid Shotgun attack, a close range blast of acid that does
      high damage, further increased if the victim is snared in a trap.
    type: Add
  - message: Added the Insight mechanic; hitting pellets of the Acid Shotgun grants
      you Insight stacks, potentially empowering your next use of Deploy Traps
    type: Add
  - message: Added Adrenaline Surge, after getting hit, you get a speed boost for
      a short duration.
