- type: entity
  parent: RMCSynthResetKeySMART
  id: AU14SynthSubversionKeyCultist
  name: WY synthetic reset key
  suffix: Cultist
  description: This device can fix major glitches or programming errors of synthetic units, as well as being able to restart a synthetic that has suffered critical failure. It can only be used once before being reset. This one has been illegally modified. Who knows what it could do.
  components:
  - type: CLFSubverter
    faction: Xeno
    briefing: "cultist-hacked-synth-briefing"
    role: "MindRoleXenoHackedSynth"
    additionalComponents:
    - type: Cultist
    - type: IntrinsicRadioReceiver
    - type: IntrinsicRadioTransmitter
      channels:
      - Hivemind
    - type: ActiveRadio
      channels:
      - Hivemind
    - type: Access
      tags:
      - CMAccessXeno
  - type: Sprite
    layers:
    - state: makeshift_key
    - state: makeshift_key_on
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false

