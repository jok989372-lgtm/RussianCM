- type: job
  parent: CMJobBase
  id: AU14JobCultist
  name: cm-cultist-name
  description: cm-cultist-description
  setPreference: true
  playTimeTracker: AU14JobCultist
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCultist
  icon: "CMJobIconEmpty"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-colonycivilian
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillFirearms: 2
    - type: JobPrefix
      prefix: au14-job-prefix-civiliancolonist
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: UserIFF
      factions:
      -  FactionXeno
    - type: NpcFactionMember
      factions:
      - RMCXeno
    - type: Access
      tags:
      - CMAccessXeno
    - type: HasKnowledgeOfXenoLanguage
    - type: RemoveComponents
      components:
      - type: Infectable
    - type: Cultist
    - type: IntrinsicRadioReceiver
    - type: IntrinsicRadioTransmitter
      channels:
      - Hivemind
    - type: ActiveRadio
      channels:
      - Hivemind
    - type: StartingMindRole
      mindRole: MindRoleCultist
    - type: CMVendorUser
      id: AU14JobCultist
      points: 70
  hidden: false

- type: entity
  parent: AU14BaseMobSpeciesOrganicCultist
  id: cultistJob
  name: Cultist
  components:
  - type: Threat
  - type: GhostTakeoverAvailable
  - type: GhostRoleApplySpecial
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: cm-cultist-name
    description: cm-cultist-description
    reregister: false
    job: AU14JobCultist
    raffle:
      settings: short
    rules: cm-cultist-rules

- type: startingGear
  id: AU14GearCultist
  equipment:
    id: AU14IDCardColonyColonist
    outerClothing: ClothingOuterRobesCult
    jumpsuit: CMJumpsuitColonist
    shoes: CMBootsBrownFilled
    back: AU14CultistSatchelBlack
    head: ClothingHeadHatHoodCulthood
    pocket1: AU14PouchIFAKFill
  inhand:
  - AU14PortableVendorCultist
  storage:
    back:
    - XenoEgg

- type: playTimeTracker
  id: AU14JobCultist
  isHumanoid: true