- type: entity
  parent: ColMarTechBase
  id: CMUWYGuardequipmentvendor
  name: We-Yu Guard equipment vendor
  description: >-
    An automated dispenser rack, hooked up to a small storage of Weyland-Yutani Security Guard apparel and equipment.
    Stocked with field gear for rapid deployment following cryogenic hypersleep or emergency mobilization.
    The interface is intentionally simple, even someone with tunnel-vision and frostbite can operate it.
