- type: entity
  abstract: false
  parent:
  - CMXenoDeveloped
  - CMXenoFlammable
  - RMCXenoCommendationReceiver
  - RMCXenoMobCollision
  id: AU14Wendigo
  name: Wendigo
  description: A large, menacing creature with a skull for head and sharp claws. Its back is branded "Weyland-Yutani".
  components:
  - type: GhostRole
    name: Wendigo
  - type: Sprite
    sprite: _AU14/Mobs/MiscMob/wendigo.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: wendigo_glowmask
      shader: unshaded
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
        BaseUnshaded: wendigo_glowmask
      Dead:
        Base: dead
  - type: Speech
    speechVerb: AU14WendigoSpeech
    allowedEmotes: [ "Growl", "Hiss", "XenoRoar", "XenoHelp", "WendigoBreathing" ]
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      1500: Dead
  - type: Xeno
    unlockAt: 99999 #never unlock naturally
    role: CMXenoWendigo
    emoteSounds: Wendigo
    actionIds:
    - ActionXenoWatch
    - ActionXenoPunch
    - ActionXenoPounce
    - ActionXenoHeadbite
    - ActionWendigoDoom
    tier: 99
    hudOffset: -0.15,0.25
  - type: XenoRegen
    standHealingMultiplier: 0.3
  - type: XenoHeavy
  - type: XenoPunch
    damage:
      types:
        Blunt: 30
  - type: XenoLeap
    plasmaCost: 0
    delay: 0
    moveDelayTime: 1.5
    knockdownTime: 3
    knockdownRequiresInvisibility: false
    unrootOnMelee: true
    leapSound:
      collection: WendigoLeap
  - type: XenoPlasma
    plasma: 0
    maxPlasma: 0
    plasmaRegenOnWeeds: 0
  - type: CMArmor
    xenoArmor: 25
    explosionArmor: 40
  - type: XenoClaws
    clawType: Sharp
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 45
  - type: XenoHeadbite
    damage:
      groups:
        Brute: 60
    emoteCooldown: 99999
  - type: WendigoHeadbiteAudio
    closeSound:
      collection: WendigoHeadbiteClose
    globalSound:
      collection: WendigoHeadbiteGlobal
    globalCooldown: 60
  - type: XenoDoom
    sound:
      collection: WendigoDoom
    slowTime: 0
  - type: MovementSpeedModifier
    baseWalkSpeed: 6
    baseSprintSpeed: 7
  - type: Tackle
    max: 4
  - type: SlowOnPull
    slowdowns:
    - multiplier: 0.6
      whitelist:
        components:
        - Marine
    - multiplier: 0.6
      whitelist:
        components:
        - XenoLight
    - multiplier: 0.4
      whitelist:
        components:
        - XenoHeavy
  - type: XenoLifesteal
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: warrior
  - type: IntelRecoverCorpseObjectiveOnDeath
    value: 0.2
  - type: SoundOnDeath
    sound:
      collection: WendigoDeath
      params:
        volume: -4
  - type: RMCSize
    size: Big

- type: entity
  parent: ActionXenoDoom
  id: ActionWendigoDoom
  name: Screech
  description: A terrifying screech that turns off lights, slows and dazes nearby hostiles.
  components:
  - type: XenoActionPlasma
    cost: 0

- type: speechVerb
  id: AU14WendigoSpeech
  name: chat-speech-verb-name-default
  speechVerbStrings:
  - Growl
- type: job
  parent: CMJobXenoBase
  id: CMXenoWendigo
  name: Wendigo
  playTimeTracker: CMJobXenoWendigo
- type: playTimeTracker
  id: CMJobXenoWendigo
  isXeno: true
