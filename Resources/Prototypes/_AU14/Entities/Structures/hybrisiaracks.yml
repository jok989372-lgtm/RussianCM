- type: entity
  parent: CMBaseStructure
  id: AU14WeymartRacks1
  name: store rack
  description: A bunch of metal shelves stacked on top of eachother, with items for sale lined up on the shelves.
  components:
  - type: AU14ShopkeeperVendor
    stockBlacklist:
      components:
      - IdCard
      - Headset
  - type: ItemSlots
    slots:
      shopkeeper_cash:
        whitelist:
          tags:
          - Currency
  - type: AccessReader
    access:
    - - AU14AccessShopkeep
  - type: ActivatableUI
    key: enum.AU14ShopkeeperVendorUi.Shop
  - type: UserInterface
    interfaces:
      enum.AU14ShopkeeperVendorUi.Shop:
        type: AU14ShopkeeperVendorBui
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ContainerContainer
    containers:
      shopkeeper_cash: !type:ContainerSlot {}
      shopkeeper_stock: !type:Container {}
  - type: InteractionOutline
  - type: Appearance
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/dodgeball.ogg"
  - type: Sprite
    sprite: _AU14/Structures/hybrisiaracks.rsi
    state: longrack1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 140
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Climbable
  - type: DamageMultiplierFlags
    flags: Breaching
  - type: XenoLeapDestroyOnPass
    spawnPrototype: CMSheetMetalBase
  - type: XenoToggleChargingDamage
    destroy: true

