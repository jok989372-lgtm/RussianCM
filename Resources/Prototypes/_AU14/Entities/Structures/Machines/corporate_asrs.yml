# Corporate ASRS — a Weyland-Yutani controlled supply system separate from the colony ASRS.
# Uses faction: "corporate" so department consoles with asrsFaction: "corporate" route orders here.
# Orders placed through a corporate department console have sales tax applied (tax → colony budget).

