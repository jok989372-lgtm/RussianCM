- type: entity
  id: AU14AICoreApolloCivilian
  parent: RMCAICore
  name: APOLLO Central A.I.
  description: This is the artificial intelligence system for monitoring the Working Joes. It is manufactured by Seegson Corporation.
  suffix: AU14, Colony
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicore.rsi
    noRot: true
    layers:
    - state: hydra-off
    - state: hydra
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: NameModifier
    baseName: "APOLLO Central A.I."
  - type: AssignXenoName
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: TypingIndicator
    proto: joe
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - radioAI
    - Colony
    - radioWEYU
    - radioCMB
  - type: ActiveRadio
    channels:
    - radioAI
    - Colony
    - radioWEYU
    - radioCMB
  - type: UserInterface
    interfaces:
      enum.VoiceMaskUIKey.Key:
        type: VoiceMaskBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.CMMobStateActionsUI.Key:
        type: CMGhostActionBui
        requireInputValidation: false
      enum.TacticalMapUserUi.Key:
        type: TacticalMapUserBui
      enum.SquadLeaderTrackerUI.Key:
        type: SquadInfoBui
      enum.DialogUiKey.Key:
        type: DialogBui
      enum.ViewIntelObjectivesUI.Key:
        type: ViewIntelObjectivesBui
  - type: TacticalMapUser
    actionId: RMCActionOpenTacticalMapMarine
    marines: true
  - type: NewPlayerLabel

- type: entity
  id: AU14AICoreApolloGOVFOR
  parent: AU14AICoreApolloCivilian
  name: APOLLO Central A.I.
  suffix: AU14, GOVFOR
  components:
  - type: IntrinsicRadioTransmitter
    channels:
    - radioAI
    - radioGovforCommand
    - radioGovforJTAC
