- type: entity
  parent: CMBarricadeBase
  id: AU14JerseyBarricade
  name: concrete barricade
  description: A barricade made out of concrete. Sometimes referred to as a 'Jersey barrier'.
  components:
  - type: BarricadeSandbag
  - type: Climbable
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Effects/gen_hit.ogg"
  - type: Sprite
    sprite: _AU14/Structures/concretebarrier.rsi
    layers:
    - state: concrete
    - map: [ "acided" ]
    drawdepth: WallTops
  - type: GenericVisualizer
    visuals:
      enum.BarbedWireVisualLayers.Wire:
        barbWired:
          UnWired: { state: concrete_wire, visible: false }
          WiredClosed: { state: concrete_wire, visible: true }
      enum.SprayAcidedVisuals.Acided:
        acided:
          True:
            sprite: _RMC14/Effects/xeno_spray_acid.rsi
            state: acid
            visible: true
          False:
            visible: false
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: CMSandbag
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 3300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageVisuals
    thresholds: [4, 8, 12]
    damageDivisor: 25
    trackAllDamage: true
    damageOverlay:
      sprite: _AU14/Structures/concretebarrier.rsi
  - type: Barbed
    thornsDamage:
      types:
        Slash: 10
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.49,-0.45,0.49,-0.55"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        - BulletImpassable
  - type: BarricadeBlock
    bidirectional: true
    blocking: 80