- type: entity
  id: AU14BaseStructureDynamicNoAnchor
  parent: BaseStructure
  abstract: true
  components:
  # These might/might not be a good idea
  #  - type: MovedByPressure
  #  - type: DamageOnHighSpeedImpact
  #  - type: TileFrictionModifier
  #    modifier: 0.5
  - type: Transform
    anchored: false
  - type: Clickable
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  parent: AU14BaseStructureDynamicNoAnchor
  id: AU14HESCOBarrier
  name: HESCO barrier
  description: A sand filled box designed to stop bullets.
  components:
  - type: Transform
    anchored: true
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: Construction
    graph: AU14HESCOGraph
    node: nodeFilled
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 4500
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Sprite
    sprite: _AU14/Structures/hesco.rsi
    state: sand_wall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.49,-0.45,0.49,-0.15"
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: BarricadeBlock
    bidirectional: true
    blocking: 70
