- type: entity
  parent: CMBeltUtilityCombat
  id: AU14BeltUtilityCombatProdigyRU
  name: L177 Prodigy pattern combat toolbelt rig
  description: Standart-issue Royal Marines Commando rig of the Prodigy Armed Repair Teams for Response Units conducting repairs within combat zones. It consists of a modular belt with various clips and pouches for tools along with a holster for a sidearm. Due to the bulk of the sidearm and one magazine.
  components:
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,19,1 # 11 slots
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - Sidearm
      - CMMagazinePistol
      - RMCMagazineRevolver
      - PowerCell
      - CMFireExtinguisherPortable
      - RMCShellShotgun
      - RMCNailgunCompact
      - RMCNailgunTactical
      - RMCSynthResetKey
      #      - # TODO analyzer
      components:
      - Welder
      - PowerCell
      - TrayScanner
      - GasAnalyzer
      - LightReplacer
      - EntrenchingTool
  - type: Sprite
    sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi
    layers:
    - state: icon
    - sprite: _RMC14/Objects/Weapons/Guns/gun_underlays.rsi
      state: m1984 # TODO RMC14 per-gun underlay
      offset: -0.3125, -0.09375
      map: [ "enum.CMHolsterLayers.Fill" ]
      visible: false
    - sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi
      state: icon-front
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi

- type: entity
  parent: AU14BeltUtilityCombatRMC
  id: AU14BeltUtilityCombatProdigyRUFilled
