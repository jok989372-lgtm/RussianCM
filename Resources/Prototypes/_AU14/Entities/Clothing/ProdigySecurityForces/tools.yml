- type: entity
  parent: BaseItem
  id: AU14ProdigyLaptop
  name: sentry laptop
  description: A ruggedized military laptop used for remote control and programming made by Prodigy Security Corp. Can be placed on tables for easier access.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/sentrycomp.rsi
    layers:
    - state: sentrycomp_cl
      map: ["enum.SentryLaptopVisualLayers.Base"]
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Devices/sentrycomp.rsi
  - type: Clickable
  - type: InteractionOutline
  - type: CollisionWake
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.15,0.25,0.15"
        density: 50
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SentryLaptopVisuals.State:
        enum.SentryLaptopVisualLayers.Base:
          Closed: { state: sentrycomp_cl }
          Open: { state: sentrycomp_op }
          Active: { state: sentrycomp_on }
    inHandsOnly: false
  - type: UseDelay
    delay: 0.5
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 2

