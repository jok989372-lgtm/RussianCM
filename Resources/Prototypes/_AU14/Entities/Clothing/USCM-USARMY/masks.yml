- type: entity
  parent: [ClothingMaskBase, BaseFoldable]
  id: AU14MaskUSASFPilotOxygen
  name: USASF LAH-99 Oxygen Mask
  description: A mask attached to USASF LAH-99 helmets to provide aircrew with breathable oxygen.
  components:
  - type: Sprite
    sprite: _AU14/Clothing/USASFSecurityForces/USASFPilot/mask.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon
      map: ["foldedLayer"]
      visible: false
  - type: HideLayerClothing
    slots:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
  - type: Clothing
    sprite: _AU14/Clothing/USASFSecurityForces/USASFPilot/mask.rsi
  - type: IdentityBlocker
    coverage: MOUTH
  - type: Item
    storedRotation: -90
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: up
    foldedHeldPrefix: up
    foldedHideLayers:
    - HeadTop
    - HeadSide
    unfoldedHideLayers:
    - HeadTop
    - HeadSide
    - Snout

- type: entity
  parent: [CMBaseMask, CMUBaseGasMaskFilterSlot]
  id: AU14MOPPMask
  suffix: AU14
  name: CBRN M3 MOPP mask
  description: The M3 MOPP mask includes a full covering cowl that securely attaches to the MOPP suit. The mask filters out harmful particles in the air to allow the wearer to breathe safely in the field. Depending on the hostility of the contaminated area the mask’s filter will last an average of 12 hours or less.
  components:
  - type: IdentityBlocker
  - type: Sprite
    sprite: _AU14/Clothing/USCMC/Mask/cbrn.rsi
  - type: Clothing
    sprite: _AU14/Clothing/USCMC/Mask/cbrn.rsi
  - type: Item
    storedRotation: -90
  - type: HideLayerClothing
    slots:
    - HeadTop
    - HeadSide
    - Hair
    - Snout
