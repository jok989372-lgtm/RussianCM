    name: "Colony Liberation Front"
    notifyAdmins: true
# Inscribed M44 - Unique CLF Veteran sidearm
- type: entity
  parent: RMCWeaponRevolverM44Custom
  id: AU14WeaponRevolverM44Inscribed
  name: inscribed M44 combat revolver
  description: A well-worn M44 combat revolver with crude inscriptions scratched into the barrel and grip. The words 'FREEDOM OR DEATH' are etched along the side. This weapon has clearly seen many battles.
  components:
  - type: RevolverAmmoProvider
    proto: RMCCartridgeRevolver44
    capacity: 10
    chambers: [ True, True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null, null ]
  - type: RMCSelectiveFire
    baseFireRate: 6

- type: entity
  name: Tattoo Gun
  parent: BaseStorageItem
  id: AU14TattooGun
  description: Used to induct people into the CLF.
  components:
  - type: TattooGun
  - type: Sprite
    sprite: _AU14/Objects/Misc/TattooGun/tattoogun.rsi
    layers:
    - state: inkgon
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1
    whitelist:
      tags:
      - TattooInk
  - type: ContainerAmmoProvider
    container: storagebase
  - type: Item
    size: Normal
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []

# Ink cartridge for the tattoo gun
- type: Tag
  id: TattooInk

- type: entity
  parent: BaseItem
  id: AU14TattooInkCartridge
  name: tattoo ink cartridge
  description: A small cartridge of dark ink for use with a tattoo gun.
  components:
  - type: Sprite
    sprite: _AU14/Objects/Misc/TattooGun/tattoogunmag.rsi
    layers:
    - state: inkmag
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
    - state: inkmag

  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - TattooInk



- type: entity
  parent: CMJumpsuitColonist
  id: AU14CMJumpsuitColonistCLF
  name: colonist uniform
  description: A stylish gray-green jumpsuit - standard issue for colonists. This one has a small earpiece clipped to the collar.
  suffix: CLF
  components:
