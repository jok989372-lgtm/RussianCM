  name: M16A2 Larue rifle
  description: "An 'improved' pattern of M16A2 recently released on the civilian market, proclaiming it is 'cutting edge modularity and optics friendliness on a budget' It met limited success in it's intended market It has seen stable but small sales regardless."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Civilian/m16a2larue64x32.rsi
