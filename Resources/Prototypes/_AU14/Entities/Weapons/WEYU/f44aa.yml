- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  name: F44AA pulse rifle
  id: AU14WeaponRifleF44AA
  description: F44AA is an electronic pulse-action assault rifle. Manufactured by the Weyland-Yutani, the rifle is equipped with an amining assist computer and safety.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/m54c/snow.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/m54c/snow.rsi
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      collection: AU14M41FireSound
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilUnwielded: 4
    scatterWielded: 6
    scatterUnwielded: 20
    baseFireRate: 4.2
    burstScatterMult: 1
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.3
    accuracyMultiplierUnwielded: 0.5
  - type: GunToggleableAutoFire
  - type: ToggleableMotionDetector
  - type: MotionDetector
    handToggleable: false
    deactivateOnDrop: false
    toggleSound: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AU14MagazineRifleF44AA
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - AU14MagazineRifleF44AA
  - type: GunDamageModifier
    multiplier: 1.1
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCM5Bayonet
      rmc-aslot-rail:
        startingAttachable: RMCAttachmentTwoPointSling
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS84xTelescopicScope
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-stock:
        startingAttachable: AU14AttachmentF44AAStockCollapsible
        whitelist:
          tags:
          - AU14AttachmentF44AAStockCollapsible
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentAngledGrip
          - RMCAttachmentBipod
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentU1GrenadeLauncher
          - RMCAttachmentU7UnderbarrelShotgun
          - RMCAttachmentVerticalGrip
          - RMCAttachmentExtinguisher
          - RMCAttachmentFlamer
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.75, 0.03
      rmc-aslot-rail: -0.07, 0.18
      rmc-aslot-stock: -0.78, 0.0325
      rmc-aslot-underbarrel: 0.349, -0.37
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: Tag
    tags:
    - AU14WeaponRifleF44AA

- type: entity
  parent: AU14WeaponRifleF44AA
  id: AU14WeaponRifleF44AALock
  suffix: ID lock
  components:
  - type: GunIDLock


- type: entity
  parent: CMMagazineRifleBase
  id: AU14MagazineRifleF44AA
  name: "F44AA magazine (10x24mm)"
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - AU14MagazineRifleF44AA
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridgeRifle10x24mm
    proto: CMCartridgeRifle10x24mm
    capacity: 450
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m54c.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance
  - type: RefillableByBulletBox
    bulletType: RMCBoxBulletsRifle

- type: entity
  parent: RMCStockAttachmentCollapsibleBase
  id: AU14AttachmentF44AAStockCollapsible
  name: F44AA folding stock
  description: The standard back end of any gun starting with F44AA.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/m54_stocks/snow.rsi
    state: m54c-col
  - type: Tag
    tags:
    - RMCAttachmentStock
    - AU14AttachmentF44AAStockCollapsible
  - type: AttachableToggleable
    doAfterBreakOnMove: false
    doAfter: 0.5
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/m54_stocks/snow.rsi
      state: m54c-col
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/m54_stocks/snow.rsi
      state: m54c-col-on
    actionName: Toggle F44AA Folding Stock
  - type: AttachableSizeMods
    modifiers:
      - size: 1
  - type: AttachableSpeedMods
    modifiers:
    - conditions:
        wieldedOnly: true
        activeOnly: true
      walk: -0.059
      sprint: -0.101
  - type: AttachableWieldDelayMods
    modifiers:
    - conditions:
        activeOnly: true
      delay: 0.2
  - type: AttachableWeaponMeleeMods
    modifiers:
    - bonusDamage:
        types:
          Blunt: 5
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
        activeOnly: true
      accuracyAddMult: 0.3
      recoilFlat: -1
      scatterFlat: -5
      fireDelayFlat: -0.08
    - conditions:
        unwieldedOnly: true
        activeOnly: true
      accuracyAddMult: -0.15
      recoilFlat: 2
      scatterFlat: 6
  - type: ItemCamouflage
    camouflageVariations: {}

- type: Tag
  id: AU14WeaponRifleF44AA

- type: Tag
  id: AU14MagazineRifleF44AA

- type: Tag
  id: AU14AttachmentF44AAStockCollapsible