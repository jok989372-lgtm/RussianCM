- type: entity
  parent: RMCGunCaseBase
  id: AU14Mk86Case
  name: Mk86 automatic grenade launcher case
  description: A gun case containing the Mk86 automatic grenade launcher. Comes with 5 magazines
  components:
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,13,1
    whitelist:
      tags:
      - MK86Mount
      - AU14Mk86Magazine
      - RMCSkillPamphlet
  - type: StorageFill
    contents:
    - id: RMCPamphletHeavyMachineGunner
    - id: AU14MK86Mount
    - id: AU14MagazineMk86Hornet
    - id: AU14MagazineMk86Hornet
    - id: AU14MagazineMk86Hornet
    - id: AU14MagazineMk86Frag
    - id: AU14MagazineMk86Smoke

- type: Tag
  id: MK86Mount

- type: Tag
  id: AU14Mk86Magazine
