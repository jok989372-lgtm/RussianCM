- type: entity
  parent: [RMCBaseSlideMagazineVisuals, CMWeaponPistolBase]
  id: AU14WeaponPistolM50HAZOPS
  name: M50 'Bald Eagle' Handcannon
  description: Produced by Armat in celebration of the upcoming United States' 400th anniversary, this pistol fires jet-propelled .50 AE rounds, which does high damage and can penetrate armor. Loved by HAZOPS due to it's mobility combined with high-damage. Must be cocked after every mag.
  suffix: Filled
  components:
  - type: RMCSelectiveFire
    scatterWielded: 10
    scatterUnwielded: 14
    baseFireRate: .95
  - type: GunDamageModifier
    multiplier: 1.4
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 2
    accuracyMultiplierUnwielded: 0.85
  - type: Gun
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_kt42.ogg
  - type: PumpAction
    sound:
      path: /Audio/_RMC14/Weapons/Guns/Cock/gun_pistol_cocked.ogg
    examine: rmc-gun-rack-examine
    popup: rmc-gun-rack-first
    popupKey: rmc-gun-rack-first-with
    once: true
  - type: Sprite
    sprite: _AU14/Weapons/Guns/HAZOPS/M50BaldEagle.rsi
  - type: Clothing
    sprite:  _AU14/Weapons/Guns/HAZOPS/M50BaldEagle.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AU14MagazinePistolM50
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - AU14MagazinePistolM50
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.71, 0.095
      rmc-aslot-rail: -0.065, 0.125
      rmc-aslot-underbarrel: 0.312, -0.25
  - type: Tag
    tags:
    - Sidearm
    - AU14WeaponPistolM50HAZOPS

- type: Tag
  id: AU14WeaponPistolM50HAZOPS

- type: entity
  parent: CMBaseMagazinePistol
  id: AU14MagazinePistolM50
  name: M50 Bald Eagle handcannon magazine (.50 JP)
  description: A pistol magazine.
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - AU14MagazinePistolM50
  - type: Item
    size: Normal
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - AU14CartridgePistol50JP
    proto: AU14CartridgePistol50JP
    capacity: 13
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/mk45.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: Tag
  id: AU14MagazinePistolM50

- type: entity
  parent: CMCartridgePistolBase
  id: AU14CartridgePistol50JP
  name: .50 JP
  components:
  - type: Tag
    tags:
    - Cartridge
    - AU14CartridgePistol50JP
  - type: CartridgeAmmo
    proto: CMBulletPistol50JP

- type: Tag
  id: AU14CartridgePistol50JP

- type: entity
  parent: CMBulletBase
  id: CMBulletPistol50JP
  name: jet-propelled .50 AE round
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 50
  - type: RMCProjectileAccuracy
    accuracy: 100
  - type: CMArmorPiercing
    amount: 65
