- type: job
  abstract: true
  parent: CMJobBase
  id: AU14JobPARTYPartyContractorBase
  name: Prodigy Yankee Contractor Base
  description: au14-prodigyparty-description
  playTimeTracker: AU14JobPARTYPartyContractor

- type: job
  parent: AU14JobPARTYPartyContractorBase
  id: AU14JobPARTYPartyContractor
  name: Prodigy Yankee Contractor (M41A/2)
  description: au14-prodigyparty-description
  ranks:
    AU14RankPrDAssociate: []
  spawnMenuRoleName: Prodigy Yankee Contractor (3rd party, M41A/2)
  startingGear: AU14GearPARTYPartyContractor
  greeting: au14-prodigyparty-greeting
  icon: "RMCJobIconPMCStandard"
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-psc
  basePlaytimeTracker: true
  accessGroups:
  - auwy
  - AUPrisonStaff
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillEndurance: 1
        RMCSkillFirearms: 2
        RMCSkillConstruction: 2
        RMCSkillEngineer: 3
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillPolice: 1
    - type: JobPrefix
      prefix: au14-job-prefix-AU14JobGOVFORSquadRiflemanWYPMC
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth

