- type: job
  parent: CMJobBase
  id: AU14JobCLFGuerillaReinforcement
  name: au14-job-name-clfguerilla
  description: au14-job-description-clfguerilla
  setPreference: true
  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFGuerilla
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 7200 # 2 hours
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCLFGuerilla
  spawnMenuRoleName: CLF Guerilla Fighter (Reinforcements)
  icon: "CMJobIconEmpty"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clflrs
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: EquipEntityPreset
      preset: AU14CLFGuerillaReinforcement
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
    - type: Skills
      skills:
        RMCSkillEndurance: 1
        RMCSkillFirearms: 2
        RMCSkillConstruction: 2
        RMCSkillEngineer: 3
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillPolice: 1
    - type: JobPrefix
      prefix: au14-job-prefix-clfguerilla
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: entity
  id: AU14CLFGuerillaReinforcement
  name: returning colonist preset
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomGearOther:
    -
      - [ CMJumpsuitColonist ]
      - [ RMCJumpsuitCivilian ]
      - [ CMJumpsuitTShirtWhite ]
      - [ CMJumpsuitTShirtGray ]
    -
      - [ RMCShoesBlack ]
      - [ RMCBootsVanBandolier ]
      - [ RMCShoesBrown ]
    -
      - [ AU14SlingSatchelBlue ]
      - [ AU14SlingSatchelBlack ]
      - [ CMSatchel ]

- type: entity
  parent: AU14BaseMobSpeciesOrganicBaseMilitary
  id: AU14IntelThirdPartyCLFInsurgentReinforcements
  name: Insurgent Reinforcements
  components:
  - type: GhostRoleApplySpecial
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: Insurgent Reinforcements
    description: You have been sent from a neighboring insurgent cell to aid the uprising in this area. Report to the local cell leader for orders.
    job: AU14JobCLFGuerillaReinforcement
    raffle:
      settings: short