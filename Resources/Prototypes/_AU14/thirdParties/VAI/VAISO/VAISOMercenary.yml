- type: job
  parent: AU14VAIMercenaryBase
  id: AU14VAISOMercenary
  spawnMenuRoleName: VAISO Contractor
  playTimeTracker: AU14VAISOMercenary
  icon: "CMJobIconEmpty"
  greeting: au14-vaiso-greeting
  startingGear: AU14GearVAISOMercenary
  basePlaytimeTracker: true
  accessGroups:
  - auadmin
  - Colonist
  - CMCargoTech
  special:
  - !type:AddComponentSpecial
    components:
    - type: AssignSquad
      whitelist:
        tags:
        - AU14SquadVAISO
    - type: Skills
      skills:
        RMCSkillCqc: 5
        RMCSkillEngineer: 4
        RMCSkillConstruction: 3
        RMCSkillFirearms: 2
        RMCSkillMedical: 1
        RMCSkillMeleeWeapons: 1
        RMCSkillPolice: 2
        RMCSkillFireman: 5
        RMCSkillPowerLoader: 2
        RMCSkillVehicles: 2
        RMCSkillJtac: 1
        RMCSkillEndurance: 1
    - type: EquipEntityPreset
      preset: AU14VAISOPreset
    - type: JobPrefix
      prefix: au14-job-prefix-vai-mercenary
  hidden: false

- type: entity
  parent: AU14BaseMobSpeciesOrganicVAI
  id: AU14VAISOMercenary
  name: VAISO Mercenary
  components:
  - type: EquipEntityPreset
    preset: AU14VAISOPreset
  - type: GhostTakeoverAvailable
  - type: GhostRoleApplySpecial
    squad: AU14SquadVAISO
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: VAISO Mercenary
    description: You have received intel on Weyland-Yutani's facility from local CLF insurgent group. Your mission is to raid the facility, securing any valuable intel. Do it without excessive attention.
    job: AU14VAISOMercenary
    raffle:
      settings: short

