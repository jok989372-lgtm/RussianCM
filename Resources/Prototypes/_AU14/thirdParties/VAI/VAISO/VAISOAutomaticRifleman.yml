    randomGearOther:
    -
      - [ AU14PVEHandsFingerlessBlackGloves ] # gloves
      - [ AU14PVEHandsFingerlessBrownGloves ]
      - [ AU14PVEHandsInsulatedBlackMarine ]
      - [ CMHandsBrown ]
    randomWeapon:
    - [ AU14WeaponMar50LMGTactical, AU14JumpsuitCivilianVAIMAR50, AU14MagazineMar50LMGAP, AU14MagazineMar50LMGAP ]
    - [ AU14WeaponMar50LMGTactical, AU14JumpsuitCivilianVAIMAR50, AU14MagazineMar50LMGAP, AU14MagazineMar50LMGAP ] # 66%
    - [ AU14WeaponRifleM41AE2Tactical, AU14JumpsuitCivilianYellowVAIM41AE2, AU14MagazineRifleM41AE2, AU14MagazineRifleM41AE2 ] # 33%
    tryEquipRandomWeapon: true

