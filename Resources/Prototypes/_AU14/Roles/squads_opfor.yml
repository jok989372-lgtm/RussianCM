# ├──[ OPFOR Squads ]────────────────────────────────────────────────┤
- type: entity
  parent: SquadBase
  id: SquadOpfor
  name: Sierra
  components:
  - type: SquadTeam
    roundStart: true
    color: "#bb91d8"
    radio: radioOpforAlpha
    group: OPFOR
    minimapBackground:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: background_sierra
    leaderIcon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_leader_a

- type: entity
  parent: SquadBase
  id: SquadOpforBravo
  name: Tango
  components:
  - type: SquadTeam
    roundStart: true
    color: "#c6c1a8"
    group: OPFOR
    radio: radioOpforBravo
    accessLevels:
    - AU14AccessOpfor
    - AU14AccessGovfor
    minimapBackground:
     sprite: /Textures/_RMC14/Interface/map_blips.rsi
     state: background_tango

