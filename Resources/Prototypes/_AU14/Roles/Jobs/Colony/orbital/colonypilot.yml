- type: job
  parent: CMJobBase
  id: AU14JobCivilianColonyPilot
  name: au14-job-name-civiliancolonypilot
  description: au14-job-description-civiliancolonypilot
  playTimeTracker: AU14JobCivilianColonyPilot
  setPreference: true
  canBeAntag: false
  requirements:
  - !type:AgeRequirement
    requiredAge: 25
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
  ranks:
    AU14RankFlightCaptain:
    - !type:RoleTimeRequirement
      role: AU14JobCivilianColonyPilot
      time: 180000 # 50 hours
    AU14RankCaptain:
    - !type:RoleTimeRequirement
      role: AU14JobCivilianColonyPilot
      time: 90000 # 25 hours
    AU14RankSeniorFirstOfficer:
    - !type:RoleTimeRequirement
      role: AU14JobCivilianColonyPilot
      time: 36000 # 10 hours
    AU14RankFirstOfficer: []
  startingGear: AU14GearCivilianColonyPilot
  dummyStartingGear: AU14GearCivilianColonyPilotDummy
  icon: "AU14JobIconCivilianColonyPilot"
  requireAdminNotify: true
  spawnMenuRoleName: Commercial Pilot (Orbital)
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-orbital
  accessGroups:
  - auwy
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      preset: AU14SkillPresetPlatoonDP
    - type: JobPrefix
      prefix: au14-job-prefix-civiliancolonypilot
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: pilot
  hidden: false

- type: startingGear
  id: AU14GearCivilianColonyPilot
  equipment:
    id: AU14IDCardCivilianColonyPilot
    eyes: RMCGlassesAviatorsSilver
    ears: AU14ColonyWeylandHeadset
    head: RMCHeadWeYaPilotCap
    back: AU14SlingSatchelBlack
    shoes: RMCShoesLaceup
    jumpsuit: RMCJumpsuitLiaisonPilot
    outerClothing: RMCCoatWeYaPilot

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCivilianColonyPilot
  name: Spawn Point Commercial Pilot
  components:
  - type: SpawnPoint
    job_id: AU14JobCivilianColonyPilot
  - type: Sprite
    state: syn_spawn

- type: startingGear
  id: AU14GearCivilianColonyPilotDummy
  equipment:
    id: AU14IDCardCivilianColonyPilot
    eyes: RMCGlassesAviatorsSilver
    ears: AU14ColonyWeylandHeadset
    head: RMCHeadWeYaPilotCap
    back: AU14SlingSatchelBlack
    shoes: RMCShoesLaceup
    jumpsuit: RMCJumpsuitLiaisonPilot
    outerClothing: RMCCoatWeYaPilot

- type: playTimeTracker
  id: AU14JobCivilianColonyPilot
  isHumanoid: true
