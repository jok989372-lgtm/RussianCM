  playTimeTracker: AU14JobMobBoss
  startingGear: AU14GearMobBoss
  icon: "AU14JobIconColonyMobBoss"
  hasIcon: false
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-mobboss
  accessGroups:
  - aumob
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillFirearms: 2
