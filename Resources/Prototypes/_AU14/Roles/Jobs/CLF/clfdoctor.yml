- type: job
  parent: CMJobBase
  id: AU14JobCLFPhysician
  name: au14-job-name-clfphysician
  description: au14-job-description-clfphysician
  setPreference: true
  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFPhysician
  requirements:
  - !type:RoleTimeRequirement
    role: AU14JobCLFGuerilla
    time: 7200 # 2 hours
  - !type:OverallPlaytimeRequirement
    time: 14400 # 4 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankCivilianDoctor: []
  startingGear: AU14GearCLFPhysician
  icon: "RMCJobIconCLFMedic"
  hasIcon: false
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clflrs
  accessGroups:
  - Colonist
  - aumed
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
      statusIcon: CLFFactionMedic
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillMedical: 3
        RMCSkillResearch: 1
        RMCSkillSurgery: 2
        RMCSkillFirearms: 2
        RMCSkillPolice: 1
    - type: JobPrefix
      prefix: au14-job-prefix-clfphysician
    - type: StartingMindRole
      mindRole: MindRoleCLFPhysician
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: startingGear
  id: AU14GearCLFPhysician
  equipment:
    ears2: RMCFlashlightPen
    suitstorage: RMCFlashlight
    id: AU14IDCardCLFPhysician
    neck: RMCCLFArmband
  inhand:
  - AU14CLFHeadset

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCLFPhysician
  name: Spawn Point CLF Physician
  components:
  - type: SpawnPoint
    job_id: AU14JobCLFPhysician
  - type: Sprite
    state: syn_spawn

- type: playTimeTracker
  id: AU14JobCLFPhysician
  isHumanoid: true
