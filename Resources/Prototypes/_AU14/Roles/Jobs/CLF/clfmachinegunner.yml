- type: job
  parent: CMJobBase
  id: AU14JobCLFMachineGunner
  name: au14-job-name-clfmachinegunner
  description: au14-job-description-clfmachinegunner
  setPreference: true
  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFMachineGunner
  requirements:
  - !type:RoleTimeRequirement
    role: AU14JobCLFGuerilla
    time: 18000 # 5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCLFMachineGunner
  icon: "RMCJobIconCLFSpecialist"
  hasIcon: false
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clflrs
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
    - type: Skills
      skills:
        RMCSkillEndurance: 2
        RMCSkillFirearms: 2
        RMCSkillConstruction: 2
        RMCSkillEngineer: 3
        RMCSkillFireman: 2
        RMCSkillVehicles: 1
        RMCSkillPolice: 1
    - type: JobPrefix
      prefix: au14-job-prefix-clfmachinegunner
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: startingGear
  id: AU14GearCLFMachineGunner
  equipment:
    outerClothing: AU14ArmorBallisticVest
    gloves: CMHandsInsulated
    shoes: RMCBootsPMCFilled
    neck: RMCCLFArmband
    jumpsuit: AU14CMJumpsuitColonistCLF
    id: AU14IDCardColonyColonist
  inhand:
  - RMCWeaponLMGM60

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCLFMachineGunner
  name: Spawn Point CLF Machine Gunner
  components:
  - type: SpawnPoint
    job_id: AU14JobCLFMachineGunner
  - type: Sprite
    state: syn_spawn

- type: playTimeTracker
  id: AU14JobCLFMachineGunner
  isHumanoid: true
