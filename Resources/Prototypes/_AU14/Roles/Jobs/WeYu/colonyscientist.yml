- type: job
  parent: CMJobBase
  id: AU14JobCivilianScientistBase
  name: au14-job-name-civilianscientist
  description: au14-job-description-civilianscientist
  playTimeTracker: AU14JobCivilianScientist
  basePlaytimeTracker: true
  hidden: true

- type: job
  parent: AU14JobCivilianScientistBase
  id: AU14JobCivilianScientist
  name: au14-job-name-civilianscientist
  description: au14-job-description-civilianscientist
  setPreference: true
  canBeAntag: true
  playTimeTracker: AU14JobCivilianScientist
  ranks:
    AU14RankScientistProfessor:
    - !type:RoleTimeRequirement
      role: AU14JobCivilianScientist
      time: 86400 # 24 hours
    AU14RankScientistAssociate:
    - !type:RoleTimeRequirement
      role: AU14JobCivilianScientist
      time: 36000 # 10 hours
    AU14RankScientistAssistant: []
  startingGear: AU14GearCivilianScientist
  icon: "RMCJobIconPMCScientist"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-colonycivilian
  spawnMenuRoleName: WY Scientist (CMU)
  accessGroups:
  - Colonist
  - auwy
  - aumed
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillMedical: 3
        RMCSkillFirearms: 2
        RMCSkillSurgery: 4
    - type: JobPrefix
      prefix: au14-job-prefix-civilianscientist
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: AssignSquad
      whitelist:
        tags:
        - SquadPMC
  hidden: false

- type: startingGear
  id: AU14GearCivilianScientist
  equipment:
    id: AU14IDCardCivilianScientist
    jumpsuit: AU14CivilianWorkwearBlue
    shoes: RMCShoesBlack
    ears: AU14ColonyWeylandHeadset
    ears2: RMCM5CameraGear
    outerClothing: RMCLabcoatOpened

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCivilianScientist
  name: Spawn Point Civilian Scientist
  components:
  - type: SpawnPoint
    job_id: AU14JobCivilianScientist
  - type: Sprite
    state: syn_spawn

- type: playTimeTracker
  id: AU14JobCivilianScientist
  isHumanoid: true
