- type: job
  parent: CMJobBase
  id: AU14JobWYGuardBase
  name: au14-job-name-wyguard
  description: au14-job-description-wyguard
  playTimeTracker: AU14JobWYGuard
  basePlaytimeTracker: true
  hidden: true

- type: job
  parent: AU14JobWYGuardBase
  id: AU14JobWYGuard
  name: au14-job-name-wyguard
  description: au14-job-description-wyguard
  setPreference: true
  ranks:
    AU14RankWYSecurityOfficerChief:
    - !type:RoleTimeRequirement
      role: AU14JobWYGuard
      time: 360000 # 100 hours
    AU14RankWYSecurityOfficerMaster:
    - !type:RoleTimeRequirement
      role: AU14JobWYGuard
      time: 180000 # 50 hours
    AU14RankWYSecurityOfficerSenior:
    - !type:RoleTimeRequirement
      role: AU14JobWYGuard
      time: 86400 # 24 hours
    AU14RankWYSecurityOfficer:
    - !type:RoleTimeRequirement
      role: AU14JobWYGuard
      time: 36000 # 10 hours
    AU14RankWYSecurityOfficerJunior: []
  startingGear: AU14GearWYGuard
  icon: "RMCJobIconPMCGoonStandard"
  requireAdminNotify: false
  requirements:
  - !type:AgeRequirement
    requiredAge: 21
  - !type:TraitsRequirement
    inverted: true
    traits:
    - Epilepsy
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-wy
  spawnMenuRoleName: WY Corporate Goon (CMU)
  accessGroups:
  - auwy
  - AUPrisonStaff
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillCqc: 1
        RMCSkillEndurance: 1
        RMCSkillFirearms: 1
        RMCSkillFireman: 1
        RMCSkillIntel: 1
        RMCSkillOverwatch: 1
        RMCSkillPolice: 2
        RMCSkillVehicles: 1
    - type: JobPrefix
      prefix: au14-job-prefix-wyguard
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: AssignSquad
      whitelist:
        tags:
        - SquadPMC
  hidden: false

- type: startingGear
  id: AU14GearWYGuard
  equipment:
    id: AU14IDCardColonyCorporateLiaison
    outerClothing: RMCOuterClothingExternalWebbingBlack
    jumpsuit: AU14WYSecurityUniformRig
    shoes: RMCBootsPMCFilled
    head: AU14CivBallCapBlack
    belt: AU14BeltUtilityGeneralBlack
    back: RMCSatchelLightpackWeYa
    ears: AU14ColonyWeylandHeadset
    ears2: RMCM5CameraGear
    suitstorage: RMCM77BeltPMCFilled

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointWYGuard
  name: Spawn Point WY guard
  components:
  - type: SpawnPoint
    job_id: AU14JobWYGuard
  - type: Sprite
    state: syn_spawn

- type: playTimeTracker
  id: AU14JobWYGuard
  isHumanoid: true
