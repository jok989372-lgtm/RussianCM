    components:
    - type: UserIFF
      factions:
      - GOVFOR
    - type: IntrinsicRadioTransmitter
      channels:
      - radioAI
      - radioGovforCommand
      - radioGovforJTAC
      - radioGovforAlpha
      - radioGovforCharlie
      - radioGovforBravo
      - radioGovforIntel
    - type: ActiveRadio
      channels:
      - radioAI
      - radioGovforCommand
      - radioGovforJTAC
      - radioGovforAlpha
      - radioGovforCharlie
      - radioGovforBravo
      - radioGovforIntel
    - type: Access
      groups:
      - AU14GovforCommand
      - AUPrisonStaff
      - auwy
    - type: Loadout
      prototypes: [ AU14GearGOVFORWorkingJoe ]
  dummyStartingGear: AU14GearGOVFORWorkingJoe
  hidden: false

- type: startingGear
  parent: AU14GearWorkingJoeBase
  id: AU14GearGOVFORWorkingJoe
  equipment:
    id: AU14IDCardGOVFORWorkingJoe
    ears: AU14HeadsetWorkingJoe
    ears2: RMCM5CameraGear
    back: AU14IMPBackpackMarine

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointGOVFORWorkingJoe
  name: Spawn Point Working Joe (GOVFOR)
  components:
  - type: SpawnPoint
    job_id: AU14JobGOVFORWorkingJoe
  - type: Sprite
    state: syn_spawn
