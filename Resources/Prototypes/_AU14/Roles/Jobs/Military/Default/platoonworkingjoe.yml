- type: job
  parent: AU14JobWorkingJoeBase
  id: AU14JobGOVFORWorkingJoe
  requirements:
  - !type:RoleTimeRequirement
    role: AU14JobGOVFORAuxSupportSynth
    time: 9000 # 2.5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
  icon: "AU14JobIconGovWorkingJoe"
  spawnMenuRoleName: Working Joe (GOVFOR)
  supervisors: au14-job-supervisors-workingjoe-military
  accessGroups:
  - AU14GovforCommand
  special:
