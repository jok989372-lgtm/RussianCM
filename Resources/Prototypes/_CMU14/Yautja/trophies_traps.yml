- type: entity
  parent: BaseItem
  id: CMUYautjaHuntingTrap
  name: hunting trap
  description: A compact alien snare that clamps onto living prey when armed.
  components:
  - type: Sprite
    sprite: _CMU14/Yautja/yautja_items.rsi
    drawdepth: Items
    layers:
    - state: yauttrap0
      map: [ "base" ]
  - type: Item
    sprite: _CMU14/Yautja/yautja_items.rsi
    size: Small
  - type: YautjaTechItem
    blockPickup: false
  - type: YautjaTrap
    damage:
      types:
        Piercing: 20
        Slash: 15
    paralyzeTime: 4
  - type: StepTrigger
    active: false
    intersectRatio: 0.15
    requiredTriggeredSpeed: 0.5
    ignoreWeightless: true
    stepOn: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        base:
          True: { state: yauttrap1 }
          False: { state: yauttrap0 }
  - type: Physics
    bodyType: Dynamic
    fixedRotation: true
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 30
        mask:
        - ItemMask
