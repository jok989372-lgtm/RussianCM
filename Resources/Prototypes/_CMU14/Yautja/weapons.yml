    blockMelee: false
  - type: Sprite
    sprite: _CMU14/Yautja/weapons.rsi
    state: clan_shield
  - type: Item
    sprite: _CMU14/Yautja/weapons.rsi
    heldPrefix: clan_shield
    size: Huge
  - type: Blocking
    blockSound: !type:SoundPathSpecifier
      path: /Audio/_CMU14/Yautja/parry.wav
    passiveBlockModifier:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.8
        Heat: 0.8
    activeBlockModifier:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.6
        Heat: 0.65
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
        Heat: 2
  - type: Damageable
    damageContainer: Shield
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 140
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

