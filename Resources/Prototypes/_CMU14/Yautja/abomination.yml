    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: charge
    useDelay: 12
  - type: InstantAction
    event: !type:YautjaAbominationRushActionEvent

- type: entity
  id: CMUActionYautjaAbominationRoar
  parent: ActionXenoBase
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: screech
    useDelay: 25
  - type: InstantAction
    event: !type:YautjaAbominationRoarActionEvent

- type: entity
  id: CMUActionYautjaAbominationSmash
  parent: ActionXenoBase
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: stomp
    useDelay: 20
  - type: TargetAction
    range: 4
    checkCanAccess: false
  - type: EntityTargetAction
    targetCheckCanInteract: false
    event: !type:YautjaAbominationSmashActionEvent
  - type: ActionInRangeUnobstructed
    range: 4

- type: entity
  id: CMUActionYautjaAbominationFrenzy
  parent: ActionXenoBase
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: rav_eviscerate
    useDelay: 15
  - type: TargetAction
    range: 2
    checkCanAccess: false
  - type: EntityTargetAction
    targetCheckCanInteract: false
    event: !type:YautjaAbominationFrenzyActionEvent
  - type: ActionInRangeUnobstructed
    range: 2

- type: entity
  id: CMUActionYautjaAbominationToggleFrenzy
  parent: ActionXenoBase
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: gut
    useDelay: 0.5
  - type: InstantAction
    event: !type:YautjaAbominationToggleFrenzyModeActionEvent

