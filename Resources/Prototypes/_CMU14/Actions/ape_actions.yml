- type: entity
  parent: ActionXenoBase
  id: ActionApeLeap
  name: Leap
  description: Jump towards a given location and knock down the first enemy hit.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 3
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeLeapActionEvent
  - type: RMCDazeableAction

- type: entity
  parent: ActionXenoBase
  id: ActionApeDestroy
  name: Destroy
  description: After a short time, jump to the targeted location, destroying structures and gibbing hostiles within a 3x3 range. Works over barricades and other short barriers.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: charge
    useDelay: 60
  - type: TargetAction
    range: 7
    deselectOnMiss: false
  - type: WorldTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeDestroyActionEvent

- type: entity
  parent: ActionXenoBase
  id: ActionApeCharge
  name: Charge
  description: Ape-specific charge. Click on a tile to wind up and charge to it, stunning and damaging foes hit.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: ready_charge
    useDelay: 14
  - type: TargetAction
    range: 9
    checkCanAccess: false
  - type: WorldTargetAction
    # Use ape-specific charge event
    event: !type:Content.Shared._CMU14.Ape.ApeChargeActionEvent

- type: entity
  parent: ActionXenoFling
  id: ActionApeRam
  name: Ram
  description: Ape-specific ram. Target an enemy to ram them, costing a small amount of plasma.
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: fling
    useDelay: 10
  - type: EntityTargetAction
    # Use ape-specific ram event
    event: !type:Content.Shared._CMU14.Ape.ApeRamActionEvent
    toggleOutline: false
  # Ape ram does not consume plasma

- type: entity
  parent: ActionXenoBase
  id: ActionApeHeadbite
  name: Headbite
  description: Ape-specific headbite that applies the headbite effect to unconscious targets.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: headbite
    useDelay: 10
  - type: TargetAction
    range: 1.5
    checkCanAccess: false
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeXenoHeadbiteActionEvent
  - type: ActionBlockIfResting
  - type: XenoOffensiveAction

