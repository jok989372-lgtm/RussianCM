# ├──[ DEFAULT BLOOD ]───────────────────────────────────────────────┤
- type: entity
  id: CMUBloodImpactEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.2
  - type: Sprite
    drawdepth: Effects
    scale: 0.75, 0.75
    color: "#b40000"
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _CMU14/Effects/blood_impact.rsi
      state: cm_bloodsplatter
  - type: SpriteColor
    color: "#b40000"
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: CMUBloodImpactEffect
  id: CMUBloodImpactEffect1
  categories: [ HideSpawnMenu ]
