- type: entity
  id: VehicleVanBase
  abstract: true
  name: van
  description: A rugged transport van.
  components:
  - type: Vehicle
    movementKind: Grid
  - type: Clickable
  - type: RMCIgnoreGhostInteractionLimits
  - type: RequireProjectileTarget
  - type: GridVehicleMover
    maxSpeed: 8
    acceleration: 5
    deceleration: 12
    turnDelay: 0.25
    pushCooldown: 2
    xenoBlockMinimumSize: Xeno
    xenoPushMinimumSize: Immobile
    canSmashWalls: true
    wallSmashMinSpeed: 5
    wallSmashWheelDamage: 0.8
    wallSmashHullDamage: 45
    wallSmashSlowdownMultiplier: 0.75
    wallSmashSlowdownDuration: 0.25
    mobCollisionHullDamage: 8
    speedAtZeroIntegrity: 0.35
    crashImmobileDuration: 8
    crashImmobileMinSpeed: 7.25
    mobCrashImmobileDuration: 4
    mobCrashImmobileMinSpeed: 5.5
    xenoMobCrashImmobileDuration: 8
    xenoMobCrashImmobileMinSpeed: 5.5
  - type: VehicleOvercharge
    speedMultiplier: 1.35
    duration: 2.5
    cooldown: 14
    overchargeSound:
      path: /Audio/_RMC14/Vehicle/box_van_overdrive.ogg
      params:
        volume: -2
  - type: VehicleSound
    runningSound:
      path: /Audio/_RMC14/Vehicle/box_van_driving.ogg
      params:
        volume: -4
    runningSoundCooldown: 2.25
    hornSound: /Audio/_RMC14/Vehicle/honk_4_light.ogg
    hornCooldown: 1
    collisionSound:
      path: /Audio/Effects/metal_thud1.ogg
      params:
        volume: -2
    collisionSoundCooldown: 1.5
    collisionSoundMinSpeed: 6
    mobCollisionSound: /Audio/_RMC14/Xeno/alien_claw_block.ogg
  - type: VehicleSpotlight
    radius: 6
    energy: 2.5
    softness: 2
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      world:
        shape:
          !type:PhysShapeAabb
          bounds: -0.425,-1.2,0.425,1.2
        density: 1000
        mask:
        - Impassable
        - HighImpassable
        - LowImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
      mob:
        shape:
          !type:PhysShapeAabb
          bounds: -0.425,-1.2,0.425,1.2
        density: 1000
        mask:
        - MidImpassable
        - BarricadeImpassable
        - LargeMobLayer
        layer:
        - LargeMobLayer
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: VehicleFrameVan
  - type: MeleeReceivedMultiplier
    xenoMultiplier: 5
    otherMultiplier: 1
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Vehicles/van.rsi
    layers:
    - map: [ base ]
      state: van_base
    - map: [ damaged_frame ]
      state: damaged_frame
      visible: false
    - map: [ rmc-wheels ]
      state: wheels_1
  - type: SpriteMovement
    movementLayers:
      rmc-wheels:
        state: wheels_0
    noMovementLayers:
      rmc-wheels:
        state: wheels_1
  - type: PointLight
    enabled: false
    radius: 6
    energy: 2.5
    softness: 2
    autoRot: true
    offset: "0,0.9"
  - type: Corrodible
    isCorrodible: false
  - type: DoAfter
  - type: UserInterface
    interfaces:
      enum.HardpointUiKey.Key:
        type: HardpointBoundUserInterface
      enum.VehicleWeaponsUiKey.Key:
        type: VehicleWeaponsBoundUserInterface
  - type: VehicleWeapons
  - type: InputMover
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      wheel-1: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
  - type: HardpointSlots
    vehicleFamily: Van
    slots:
    - id: wheel-1
      disableEject: true
      hardpointType: Wheel
      slotType: Wheel
      insertDelay: 1.5
      whitelist:
        components:
        - VehicleWheelItem
  - type: VehicleWheelSlots
    slotCount: 1
    slots:
    - wheel-1
  - type: HardpointIntegrity
    maxIntegrity: 1000
    integrity: 1000
    repairFuelCost: 10
    bypassEntryOnZero: true
  - type: HardpointState
  - type: Appearance
  - type: VehicleEnter
    interiorPath: /Maps/_RMC14/Vehicles/van_interior.yml
    enterDoAfter: 1.0
    exitDoAfter: 1.0
    maxPassengers: 8
    maxXenos: 2
    entryPoints:
    - offset: 1,-1
      radius: 0.6
      interiorCoords: 3.5,-0.34
    - offset: -1,-1
      radius: 0.6
      interiorCoords: 3.25,-1
    - offset: 0,2
      radius: 0.75
      interiorCoords: 0.25,-1

- type: entity
  parent: VehicleVanBase
  id: VehicleVan

