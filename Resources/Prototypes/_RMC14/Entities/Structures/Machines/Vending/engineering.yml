# ENGINEERING

# Tools
- type: entity
  parent: ColMarTechBaseAnchorable
  id: CMVendorTool
  name: Tool Storage Machine
  description: A large storage machine containing various tools and devices for general repair.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/tool.rsi
    layers:
    - state: "off"
      map: [ "enum.VendingMachineVisualLayers.Base" ]
    - state: "normal-unshaded"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded" ]
      shader: unshaded
  - type: AccessReader
    access: [["CMAccessCombatTechPrep"], ["CMAccessEngineering"], ["CMAccessColonyEngineering"], ["AU14AccessGovforEngineering"], ["AU14AccessOpforEngineering"]]
  - type: CMAutomatedVendor
    access:
    - "CMAccessCombatTechPrep"
    - "CMAccessEngineering"
    - "CMAccessColonyEngineering"
    - "AU14AccessGovforEngineering"
    - "AU14AccessOpforEngineering"
    hackable: true
    sections:
    - name: Equipment
      entries:
      - id: RMCFlashlight
        amount: 10
      - id: RMCSentryLaptop
        amount: 4
      - id: RMCHardhatBlue
        amount: 4
      - id: CMHandsInsulated
        amount: 4
      - id: CMBeltUtility
        amount: 4
      - id: RMCWeldingGoggles
        amount: 4
      - id: RMCHelmetWelding
        amount: 4
      - id: RMCEngineerKit
        amount: 2
    - name: Scanners
      entries:
      #Atmos scanner
      #Demo scanner
      #Meson scanner
      #Reagent scanner
      - id: CMTRayScanner
        amount: 4
    - name: Tools
      entries:
      - id: CMWelder
        amount: 4
      - id: CMCrowbar
        amount: 4
      - id: CMWelderSmall
        amount: 2
      - id: CMScrewdriver
        amount: 4
      - id: CMWirecutter
        amount: 4
      - id: CMWrench
        amount: 4
      - id: RMCLightReplacer
        amount: 6

