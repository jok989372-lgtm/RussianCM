- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCBarricadeRazorwire
  name: razorwire
  description: A set of razorwire, able to slow down anything that tries to move through it. Cut with wirecutters to disable, then unwrench to recover.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Rotatable
  - type: Appearance
  - type: Sprite
    sprite: _RMC14/Structures/Walls/Barricades/razorwire.rsi
    state: barbed_wire
    drawdepth: WallTops
  - type: MinimapColor
    color: "#8d2294ad"
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/_RMC14/Structures/metalhit.ogg"
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        hard: false
        density: 50
        mask:
        - MobMask
        layer:
        - SlipLayer
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.3
    sprintSpeedModifier: 0.3
  - type: DamageContacts
    damage:
      types:
        Slash: 1
  - type: DamageOnAttacked
    damage:
      types:
        Slash: 10
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: CMBarricade
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          BarbedWire1:
            min: 1
            max: 1
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Structures/metalhit.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Barricade
  - type: Construction
    graph: RazorwireGraph
    node: nodeRazorwire
  - type: Tag
    tags:
    - RMCRazorwire

- type: Tag
  id: RMCRazorwire

- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCBarricadeRazorwireCut
  name: cut razorwire
  description: A set of razorwire that has been cut. No longer functional. Use a wrench to tear it up and recover the remaining wire.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Rotatable
  - type: Appearance
  - type: Sprite
    sprite: _RMC14/Structures/Walls/Barricades/razorwire.rsi
    state: barbed_wire_broken
    drawdepth: WallTops
  - type: MinimapColor
    color: "#8d229478"
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/_RMC14/Structures/metalhit.ogg"
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: CMBarricade
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          BarbedWire1:
            min: 1
            max: 1
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Structures/metalhit.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Construction
    graph: RazorwireGraph
    node: nodeRazorwireCut
