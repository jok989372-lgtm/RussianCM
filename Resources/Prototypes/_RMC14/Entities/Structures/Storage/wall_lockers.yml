- type: entity
  parent: CMLockerBase
  id: CMLockerCMDCabinet
  name: command tablet cabinet
  suffix: Empty
  description: A bulletproof cabinet containing essentials for usage by a Commander.
  components:
  - type: WallMount
    arc: 175
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Structures/Wallmounts/cmdcabinet.rsi
  - type: EntityStorage
    capacity: 9
    isCollidableWhenOpen: true
    enteringOffset: 0, -0.6
    enteringRange: 0.03
  - type: AccessReader
    access: [["RMCAccessSeniorCommand"], ["AU14AccessGovforCommand"], ["AU14AccessOpforCommand"]]
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMLockerCMDCabinet
  id: CMLockerCMDCabinetFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: CMLockerFillCMDCabinet

# there should be a variant for CL, but it's fill is not yet implemented

- type: entityTable
  id: CMLockerFillCMDCabinet
  table: !type:AllSelector
    children:
    - id: AU14Scissors
    - id: CMPen
    - id: CMPaperBin30
    - id: CMFolderRedEmpty
    - id: CMFolderBlueEmpty
    - id: CMStampApproved
    - id: CMStampDenied
    - id: RMCSynthResetKey
    - id: RMCMegaphone
