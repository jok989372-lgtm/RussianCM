# Base
- type: entity
  abstract: true
  id: RMCMechBase
  components:
  - type: Corrodible
    isCorrodible: true
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: powerloader_open
      map: [ "buckledLayer" ]
  - type: MobMover
  - type: DoAfter
  - type: MeleeWeapon
    hidden: true
    attackRate: 1
    damage:
      types:
        Blunt: 30
    soundHit:
      collection: MetalThud
  - type: Puller
    needsHands: false
  - type: InputMover
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 1
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: ContainerContainer
    containers:
      rmc-mech-pilot: !type:ContainerSlot
  - type: Damageable
    damageContainer: Inorganic
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: RMCAllowStrapMovement
  - type: Strap
    buckleSound:
      path: /Audio/_RMC14/Mecha/powerloader_buckle.ogg
      params:
        variation: 0.1
    unbuckleSound:
      path: /Audio/_RMC14/Mecha/powerloader_unbuckle.ogg
      params:
        variation: 0.1
    blacklist:
      components:
      - Xeno
  - type: RMCStrapDrawDepth
    unstrappedDepth: Mobs
    strappedDepth: OverMobs
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay }
          False: { state: powerloader_open }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCPowerCellAPC:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

# Wreckages
- type: entity
  id: RMCMechPowerLoaderWreckage
  name: Caterpillar P-5000 Work Loader wreckage
  description: Remains of some unfortunate Power Loader. Completely unrepairable.
  components:
  - type: Corrodible
    isCorrodible: true
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck
  - type: Clickable
  - type: InputMover
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: Strap
    blacklist:
      components:
      - Xeno
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCMechPowerLoaderWreckage
  id: RMCMechPowerLoaderWreckageGreen
  name: John Deere 4300 Power Loader wreckage
  components:
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck_jd

- type: entity
  parent: RMCMechPowerLoaderWreckage
  id: RMCMechPowerLoaderWreckageBlue
  name: Caterpillar P-5200 Work Loader wreckage
  components:
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck_ft

- type: entity
  parent: RMCMechBase
  id: RMCMechPowerLoader
  name: Caterpillar P-5000 Work Loader
  description: The Caterpillar P-5000 Work Loader is a commercial mechanized exoskeleton used for lifting heavy materials and objects, first designed in January 29, 2025 by Weyland Corporation. An old but trusted design used in warehouses, constructions and military ships everywhere.
  components:
  - type: PowerLoader
    skills:
      all:
        RMCSkillPowerLoader: 1
  - type: Hands
  - type: GiveHands
    hands:
    - name: Right Hand
      location: Right
    - name: Left Hand
      location: Left
  - type: IgnoreInteractionRange
    whitelist:
      tags:
      - RMCDropshipEnginePoint
    range: 2
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckage

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderGreen
  name: John Deere 4300 Power Loader
  description: John Deere 4300 Work Loader is a commercial mechanized exoskeleton used for lifting heavy materials and objects based on the Caterpillar P-5000, first designed in January 29, 2025 by Weyland Corporation. An old but trusted design used in warehouses, constructions and military ships everywhere. This one has a signature green and yellow livery.
  components:
  - type: Sprite
    layers:
    - state: powerloader_open_jd
      map: [ "buckledLayer" ]
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay_jd }
          False: { state: powerloader_open_jd }
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageGreen

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderBlue
  name: Caterpillar P-5200 Work Loader
  description: A modernized design made to outdo the older models once used in fancy ports and facilities.
  components:
  - type: Sprite
    layers:
    - state: powerloader_open_ft
      map: [ "buckledLayer" ]
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay_ft }
          False: { state: powerloader_open_ft }
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageBlue