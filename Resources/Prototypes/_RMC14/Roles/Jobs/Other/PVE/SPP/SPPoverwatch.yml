    job_id: RMCSPPPlatCoPVE
  - type: Sprite
    sprite: _RMC14/Markers/landmarks.rsi
    state: spp_spawn

- type: startingGear
  id: RMCSPPPlatCoPVEGear
  equipment:
    id: RMCIDSPP

    jumpsuit: CMJumpsuitSPPOfficer
    outerClothing: RMCCoatSPP
    head: CMHeadCapSPPBeret
    shoes: CMBootsBlackFilled

- type: playTimeTracker
  id: RMCJobSPPPlatCoPVE
